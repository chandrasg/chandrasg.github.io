/* ===== Mobile-First Responsive Overrides ===== */

  .page__content { font-size: 0.95em; }

  .author__avatar img { max-width: 80px; }
  .author__content { padding-right: 10px; }
  .author__bio { font-size: 0.85em; }
  .author__urls-wrapper { display: block; }

  .author__urls a { font-size: 0.85em; padding: 2px 0; }

  /* Research theme cards: full width on mobile */
  .theme-cards { gap: 12px !important; }
  .theme-card { min-width: 100% !important; padding: 14px !important; }

  /* Lab member grid: 2-up on mobile */
  .members-grid { gap: 16px !important; }
  .member-card { width: 110px !important; }
  .member-card img { width: 90px !important; height: 90px !important; }

  .pub-list li { padding-left: 0; text-indent: 0; font-size: 0.9em; margin-bottom: 1em; }

  .page__footer { font-size: 0.8em; }

  /* Talks list */
  .page__content ul li { margin-bottom: 0.8em; }
}

/* Tablet refinements */

/* ===== Refined Visual Design ===== */

/* Cleaner page typography */

.theme-card { flex: 1; min-width: 220px; border: 1px solid #e2e6ea; border-radius: 8px;
