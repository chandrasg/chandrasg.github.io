name: Sync publications from Google Scholar

on:
  # Schedule disabled — publications are maintained manually from CV
  # schedule:
  #   - cron: "0 3 * * 1"  # Every Monday at 03:00 UTC
  workflow_dispatch:      # Still runnable manually from the Actions tab if needed

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install scholarly

      - name: Sync publications from Google Scholar
        run: python bin/sync_publications.py
        env:
          # scholarly uses environment proxies if set; leave blank for direct access
          HTTPS_PROXY: ""

      - name: Classify publications into research themes
        run: python bin/classify_publications.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _bibliography/papers.bib
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync publications from Google Scholar [skip ci]"
            git push
          fi
