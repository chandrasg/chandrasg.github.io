# Site Settings
locale                   : "en-US"
title                    : "Sharath Chandra Guntuku"
title_separator          : "-"
name                     : &name "Sharath Chandra"
description              : &description "Sharath Chandra Guntuku - Associate Professor at UPenn. Research in AI, NLP, public health informatics, mental health, and computational social science."
url                      : https://sharathg.cis.upenn.edu
baseurl                  : ""
repository               : "chandrasg/chandrasg.github.io"
teaser                   : "sharath.jpg"
breadcrumbs              : false
words_per_minute         : 160
atom_feed:
  path                   :

# SEO Related
google_site_verification : googled9f07de75b15a428.html

# Social Sharing
twitter:
  username               : &sharathguntuku
og_image                 :

# Analytics
analytics:
  provider               : false

# Site Author
author:
  name             : "Sharath Chandra Guntuku"
  avatar           : "sharath.jpg"
  bio              : "Computer Science x Psychology and Health Research"
  employer         : "University of Pennsylvania"
  googlescholar    : "https://scholar.google.com/citations?user=76_hrfUAAAAJ&hl=en"
  email            : "sharathg@cis.upenn.edu"
  github           : "sharathchandra92"
  linkedin         : "sharathchandra92"
  twitter          : "sharathguntuku"


# Reading Files
include:
  - .htaccess
  - _pages
  - files
  - pages
exclude:
  - _cite
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# Collections
collections:
  talks:
    output: true
    permalink: /:collection/:path/
  media:
    output: true
    permalink: /:collection/:path/


# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed


# Outputting
permalink: /:categories/:title/
timezone: America/New_York


# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji


# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/


# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
